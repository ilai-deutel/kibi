name: Sanitizers

on:
  pull_request:
    branches:
      - master
    paths:
      - ".github/workflows/sanitizers.yml"
      - "**.rs"
      - "*cargo/config.toml"
      - "*Cargo.toml"
      - "*Cargo.lock"
  schedule:
    - cron: "12 07 * * 2" # weekly on Tuesday

permissions:
  contents: read

jobs:
  sanitizers:
    strategy:
      fail-fast: false
      matrix:
        sanitizer:
          - address
          - leak
          - memory
          - safestack
          - thread
        target:
          - x86_64-unknown-linux-gnu
          - aarch64-apple-darwin
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - sanitizer: memory
            extra_flags: -Zsanitizer-memory-track-origins
        exclude:
          # LeakSanitizer is not supported on MacOS
          - sanitizer: leak
            target: aarch64-apple-darwin
          # MemorySanitizer is not supported on MacOS
          - sanitizer: memory
            target: aarch64-apple-darwin
          # Safestack is not supported on MacOS
          - sanitizer: safestack
            target: aarch64-apple-darwin

    runs-on: ${{ matrix.os }}

    permissions:
      contents: read

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Setup cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          prefix-key: rust-nightly
      - name: Install Rust nightly with rust-src
        run: |
          rustup toolchain install nightly --target ${{ matrix.target }} --component rust-src --profile minimal --allow-downgrade
          rustup default nightly
          rustc +nightly --version --verbose
      - name: Install cargo-nextest
        run: cargo install --locked --verbose cargo-nextest
      - name: Run tests with sanitizer
        run: ci/build_and_test.sh --sanitizer ${{ matrix.sanitizer }} --target ${{ matrix.target }} --no-coverage
