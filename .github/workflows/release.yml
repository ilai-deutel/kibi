name: release

on:
  push:
    tags:
    - 'v[0-9]+\.[0-9]+\.[0-9]+'
    - test-release

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8  # v5
      # TODO: Check version matches with Cargo.toml
      - name: Create release
        run: |
          gh release create ${{ github.ref_name }} --title ${{ github.ref_name }} --draft --verify-tag --fail-on-no-commits
        env:
          GH_TOKEN: ${{ github.token }}
    outputs:
      release_tag: ${{ env.VERSION }}

  build-assets:
    needs:
      - create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
          - os: ubuntu-latest
            target: i686-unknown-linux-gnu

          # MacOS
          - os: macos-latest
            target: x86_64-apple-darwin

          # Windows
          - os: windows-latest
            target: x86_64-pc-windows-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: windows-latest
            target: i686-pc-windows-msvc
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8  # v5
      - name: Install Rust stable toolchain
        run: |
          rustup toolchain install stable --target ${{ matrix.target }} --profile minimal
          rustup default stable
          rustc +stable --version --verbose
      - name:  Build binary
        run: |
          cargo build --target ${{ matrix.target }} --release --verbose
          echo "BINARY_PATH=target/${{ matrix.target }}/release/kibi" >> $GITHUB_ENV
        env:
          RUSTFLAGS: -D warnings
      - name: Compress the binary
        run: upx --best --lzma "$BINARY_PATH"
      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: kibi-${{ github.ref_name }}-${{ matrix.target }}
          path: ${{ env.BINARY_PATH }}
          if-no-files-found: error
      - name: Create package directory
        run: |
          ARCHIVE_DIR="$(mktemp --directory)"
          cp --recursive \
            "$BINARY_PATH" \
            CHANGELOG.md \
            COPYRIGHT \
            LICENSE-APACHE \
            LICENSE-MIT \
            README.md \
            config_example.ini \
            syntax.d \
            "$ARCHIVE_DIR"
          echo "ARCHIVE_DIR=$ARCHIVE_DIR" >> $GITHUB_ENV
      - name: Create asset (Unix)
        if: matrix.os != 'windows'
        run: |
          ASSET_PATH=kibi-${{ github.ref_name }}-${{ matrix.target }}.tar.gz
          tar czvf "$ASSET_PATH" -C "$ARCHIVE_DIR" .
          echo "ASSET_PATH=$ASSET_PATH" >> $GITHUB_ENV
      - name: Create asset (Windows)
        if: matrix.os == 'windows'
        run: |
          ASSET_PATH=kibi-${{ github.ref_name }}-${{ matrix.target }}.zip
          7z a "$ASSET_PATH" "$ARCHIVE_DIR"
          echo "ASSET_PATH=$ASSET_PATH" >> $GITHUB_ENV
      - name: Upload asset to release
        run: gh release upload ${{ github.ref_name }} "$ASSET_PATH"
        env:
          GH_TOKEN: ${{ github.token }}

    runs-on: ${{ matrix.os }}